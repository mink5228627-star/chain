<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결과 - 코드 11011</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #ececec;
            display: flex;
            justify-content: center;
            line-height: 1.8;
            margin: 0;
            padding: 20px;
        }

        .story-container {
            max-width: 700px;
            width: 100%;
            background-color: #2d2d2d;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 50px;
            margin-bottom: 50px;
        }

        /*제일 위 타이틀 */
        .story-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4f46e5;
        }

        /*평문(상황 묘사, 지문) */
        .narration {
            font-size: 16px;
            color: #b0b0b0;
            margin-bottom: 40px;
            font-style: italic; /* 평문은 약간 기울여서 구분 */
        }

        /* 대사문 전체 감싸는 틀 */
        .dialogue-wrap {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        /* 대사문 - 이름 */
        .speaker {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 5px;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
        }

        /* 화자별 색상 고유 지정  */
        .speaker.man1 { background-color: #8224e3; color: #fff; } /* 서하윤 */
        .speaker.man2 { background-color: #e54646; color: #fff; } /* 이도현 */
        .speaker.man3 { background-color: #4f46e5; color: #fff; } /* 이수환 */
        .speaker.man4 { background-color: #aaad00; color: #fff; } /* 이시아 */
        .speaker.man5 { background-color: #3daf17; color: #fff; } /* 김유찬 */
        .speaker.man6 { background-color: #fff; color: #000000; } /* 셀리온 */


        /* 5. 대사문 - 실제 대사 */
        .dialogue-text {
            font-size: 17px;            
            padding: 15px 15px;
            background-color: #3d3d3d;
            margin-bottom: 40px;
            border-radius: 0 10px 10px 10px; /* 말풍선 모양 */
            color: #fff;
            position: relative;
        }
        
        .dialogue-wrap.man1 {
            align-items : flex-start;
        }
        .dialogue-wrap.man1 .dialogue-text {
            border-radius: 10px 10px 0 10px;
            background-color: #8224e3;
        }

         .dialogue-wrap.man2 {
        align-items : flex-end;
        }
        .dialogue-wrap.man2 .dialogue-text {
            border-radius: 10px 10px 0 10px;
            background-color: #e54646;
        }


        .dialogue-wrap.man3 {
            align-items: flex-end;
        }
        .dialogue-wrap.man3 .dialogue-text {
            border-radius: 10px 10px 0 10px;
            background-color: #3730a3;
        }

       .dialogue-wrap.man4 {
        align-items: flex-start;
              }
        .dialogue-wrap.man4 .dialogue-text {
            border-radius: 10px 10px 0 10px;
            background-color: #aaad00;
        }

        .dialogue-wrap.man5 {
        align-items: flex-end;
        }
        .dialogue-wrap.man5 .dialogue-text {
            border-radius: 10px 10px 0 10px;
            background-color: #3daf17;
        }

        .dialogue-wrap.man6 {
        align-items: flex-start;
        }
        .dialogue-wrap.man6 .dialogue-text {
            border-radius: 10px 10px 0 10px;
            background-color: #000000;
        }

        /* 6. 엔딩부 */
        .ending-box {
            margin-top: 60px;
            padding: 30px;
            background-color: #1a1a1a;
            border: 2px solid #4f46e5;
            border-radius: 10px;
            text-align: center;
        }
        .ending-user {
            font-size: 18px;
            color: #a5b4fc;
            margin-bottom: 10px;
        }
        .ending-name {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
        }

        /* 돌아가기 버튼 */
        .back-btn {
            display: block;
            width: 150px;
            margin: 40px auto 0;
            text-align: center;
            padding: 10px;
            background-color: #555;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
        .back-btn:hover { background-color: #666; }

    </style>
</head>
<body>

    <div class="story-container">
        <div class="story-title">이수환 단독 생존</div>

        <p class="narration">
           백영기가 살육 전차처럼 사람들을 썰고 지나간 자리엔<br> 
적막과 공포만이 남고서 나 혼자만이 살아남았다.
        </p>

        <div class="dialogue-wrap man3">
            <span class="speaker man3">이수환</span>
            <div class="dialogue-text">
               오늘 근무한 직원 여섯 중에 <br>
한 명은 살해당했고<br>
두 명은 살해 작당을 했고<br>
한 명은 적대 세력 스파이고<br>
한 명은 월급루팡이였다라...<br><br>

TC가 제대로 운영되고 있는 건 맞겠지? 반기를 들 생각은 없으니 이런 쓸모없는 생각은 미리미리 접어두자.<br><br>

역시 정의는 승리하는 법이다.<br>
            </div>
        </div>

        <div class="ending-box">
            <div class="ending-user">엔딩 코드 : 11011</div>
            <div class="ending-name">[ 이수환 – Happy End ]</div>
        </div>

        <a href="index.html" class="back-btn">처음으로 돌아가기</a>
    </div>

</body>
</html>
