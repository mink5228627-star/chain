<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고발 페이즈 에필로그</title>
    <style>
        /* 웹페이지를 예쁘게 꾸미는 CSS 스타일 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 380px;
        }
        h1 {
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 700;
        }
        .condition-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e1e4e8;
        }
        .condition-row:last-of-type {
            border-bottom: none;
            margin-bottom: 25px;
        }
        .condition-title {
            font-weight: 600;
            color: #4a4a4a;
        }
        .radio-group {
            display: flex;
            gap: 15px;
        }
        .radio-group label {
            cursor: pointer;
            font-size: 15px;
            color: #333;
        }
        .submit-btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 생존자 체크 ✨</h1>
        
        <form id="survivalForm">
            <!-- 조건 1 ~ 5 (살았음=0, 죽었음=1) -->
            <div class="condition-row">
                <span class="condition-title">서하윤</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond1" value="0"> 살았음</label>
                    <label><input type="radio" name="cond1" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">이도현</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond2" value="0"> 살았음</label>
                    <label><input type="radio" name="cond2" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">이수환</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond3" value="0"> 살았음</label>
                    <label><input type="radio" name="cond3" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">이시아</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond4" value="0"> 살았음</label>
                    <label><input type="radio" name="cond4" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">김유찬</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond5" value="0"> 살았음</label>
                    <label><input type="radio" name="cond5" value="1"> 죽었음</label>
                </div>
            </div>

            <button type="button" class="submit-btn" onclick="checkResults()">결과보기</button>
        </form>
    </div>

    <script>
        function checkResults() {
            let resultString = "";
            const totalConditions = 5;

            // 1. 5개의 조건이 모두 선택되었는지 확인하고 값을 문자열로 합칩니다.
            for (let i = 1; i <= totalConditions; i++) {
                // 각 조건별로 체크된 라디오 버튼을 찾습니다.
                const checkedRadio = document.querySelector(`input[name="cond${i}"]:checked`);
                
                // 선택을 안 한 항목이 있다면 경고창을 띄우고 함수를 종료합니다.
                if (!checkedRadio) {
                    alert(`조건 ${i}을(를) 선택해주세요.`);
                    return;
                }
                // 선택된 값(0 또는 1)을 결과 문자열에 이어 붙입니다.
                resultString += checkedRadio.value;
            }

            // 2. 예외 처리: 모두 살았음(00000)을 선택한 경우
            if (resultString === "00000") {
                alert("그런 경우는 존재하지 않습니다.");
                return;
            }

            // 3. 페이지 이동 (최적화의 핵심)
            // 예를 들어 resultString이 '01001'이라면, 'result_01001.html' 페이지로 이동하게 됩니다.
            // 이렇게 하면 31개의 조건문을 쓸 필요 없이 파일명만 맞춰주면 됩니다.
            const targetPage = `result_${resultString}.html`;
            
            // 실제 이동을 확인하고 싶다면 아래 주석을 풀고 실행하세요.
            window.location.href = targetPage;
            
            // 현재는 파일이 없으니 어떤 파일로 이동하는지 알림창으로만 보여줍니다.
            alert(`[테스트] ${targetPage} (으)로 이동합니다!`);
        }
    </script>
</body>
</html>
