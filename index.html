<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고발 페이즈 에필로그</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 380px;
        }
        h1 {
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 700;
        }
        .condition-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e1e4e8;
        }
        .condition-row:last-of-type {
            border-bottom: none;
            margin-bottom: 25px;
        }
        .condition-title {
            font-weight: 600;
            color: #4a4a4a;
        }
        .radio-group {
            display: flex;
            gap: 15px;
        }
        .radio-group label {
            cursor: pointer;
            font-size: 15px;
            color: #333;
        }
        .submit-btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 생존자 체크 ✨</h1>
        
        <form id="survivalForm">
            <!-- 조건 1 ~ 5 (살았음=0, 죽었음=1) -->
            <div class="condition-row">
                <span class="condition-title">서하윤</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond1" value="0"> 살았음</label>
                    <label><input type="radio" name="cond1" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">이도현</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond2" value="0"> 살았음</label>
                    <label><input type="radio" name="cond2" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">이수환</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond3" value="0"> 살았음</label>
                    <label><input type="radio" name="cond3" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">이시아</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond4" value="0"> 살았음</label>
                    <label><input type="radio" name="cond4" value="1"> 죽었음</label>
                </div>
            </div>
            <div class="condition-row">
                <span class="condition-title">김유찬</span>
                <div class="radio-group">
                    <label><input type="radio" name="cond5" value="0"> 살았음</label>
                    <label><input type="radio" name="cond5" value="1"> 죽었음</label>
                </div>
            </div>

            <button type="button" class="submit-btn" onclick="checkResults()">결과보기</button>
        </form>
    </div>

    <script>
        function checkResults() {
            let resultString = "";
            const totalConditions = 5;

            for (let i = 1; i <= totalConditions; i++) {
                const checkedRadio = document.querySelector(`input[name="cond${i}"]:checked`);
                
                // 다 선택해야함
                if (!checkedRadio) {
                    alert(`조건 ${i}을(를) 선택해주세요.`);
                    return;
                }
                // 숫자 이어붙이기
                resultString += checkedRadio.value;
            }

            // 모두 사는 경우는 없음
            if (resultString === "00000") {
                alert("그런 경우는 존재하지 않습니다.");
                return;
            }

            localStorage.setItem('savedResult', resultString);

            // 페이지 이동
            // 값이 '01001'이라면, 'result_01001.html' 페이지로
            const targetPage = `result_${resultString}.html`;
            
            window.location.href = targetPage;
            
            alert(`에필로그 코드 : `+ resultString +' 으로 이동합니다. 수고하셨습니다.');
            window.location.href = targetPage;
        }
    </script>
</body>
</html>
